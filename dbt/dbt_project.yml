name: "shorelane"
version: "1.0.0"
config-version: 2

profile: "shorelane"

model-paths: ["models"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  shorelane:
    staging:
      +materialized: view
    marts:
      +materialized: table

# Generation timeline, exposed to models via {{ var('...') }} if needed.
vars:
  dataset_version: "shorelane-v2"
