version: 2

sources:
  - name: app_db
    description: "Shorelane's own application database (orders, billing, rev-rec)."
    # Must match the dataset the loader writes to (loaders/bigquery_load.py default
    # --dataset shorelane_raw). dbt models materialize to the profile dataset
    # (shorelane); raw landing tables live separately in shorelane_raw.
    schema: shorelane_raw
    tables:
      - name: app_db__orders
        identifier: app_db__orders
      - name: app_db__invoices
        identifier: app_db__invoices
      - name: app_db__revenue_recognition
        identifier: app_db__revenue_recognition

  - name: stripe
    description: "Payment processor. Source of refunds (and, later, charges/disputes)."
    schema: shorelane_raw
    tables:
      - name: stripe__refunds
        identifier: stripe__refunds
