name: tag-on-version

# Cuts a git tag from pyproject.toml's version whenever main moves.
#
# Downstream repos pin this repo by tag (shorelane-pipeline/requirements.txt and
# shorelane-dbt/parity/requirements.txt), and both MUST pin the same version --
# the pipeline loads data with these generators while the parity job evaluates
# it with this measures.py. Mismatched versions give false parity results.
#
# Releasing is therefore just editing `version` in the PR you were already
# opening, rather than a separate manual step. Tags are IMMUTABLE: this never
# moves an existing tag, because `pip install ...@v2.0.0` silently returning
# different code depending on when you ran it is precisely the silent-divergence
# failure this repo exists to demonstrate.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # tomllib is stdlib from 3.11 only; pin rather than trust the runner image.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from pyproject.toml
        id: version
        run: |
          set -euo pipefail
          version=$(python -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "pyproject version: $version"

      - name: Create tag if it does not already exist
        env:
          TAG: ${{ steps.version.outputs.tag }}
          # Exactly what pip installs, per pyproject.toml's
          # py-modules = ["config"] and packages = ["generators", "loaders"].
          # Keep this in sync with that list, or a real code change could ship
          # under an existing tag without anyone noticing.
          PACKAGE_PATHS: "config.py generators loaders pyproject.toml"
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            tagged=$(git rev-list -n1 "$TAG")
            if [ "$tagged" = "$GITHUB_SHA" ]; then
              echo "$TAG already points at this commit; nothing to do."
              exit 0
            fi

            # The tag exists elsewhere. Whether that is a problem depends
            # ENTIRELY on whether the installable package changed.
            #
            # Consumers pin this repo by tag and install it with pip, so what
            # they receive is exactly $PACKAGE_PATHS. A commit that touches only
            # docs, tests or workflows produces a byte-identical install, so
            # demanding a version bump for it would be noise -- and worse, it
            # would fail CI on every docs merge until people learned to ignore
            # a red main.
            # Split explicitly rather than relying on unquoted word-splitting.
            # It works in bash, but silently does the wrong thing in zsh (which
            # does not split) -- there the whole string becomes ONE pathspec,
            # matches nothing, and every check reports "no packaged changes".
            read -ra package_paths <<< "$PACKAGE_PATHS"

            if git diff --quiet "$TAG" "$GITHUB_SHA" -- "${package_paths[@]}"; then
              echo "::notice::$TAG already exists, but no packaged file changed"
              echo "::notice::since it ($PACKAGE_PATHS). Nothing to release."
              exit 0
            fi

            # Packaged code really did change under an already-published tag.
            # Bump the version in the same PR; moving the tag instead would mean
            # `pip install ...@$TAG` returns different code depending on when it
            # ran, which is the silent divergence this fixture exists to expose.
            echo "::error::$TAG already exists at $tagged, and packaged files have"
            echo "::error::changed since. Bump the version in pyproject.toml --"
            echo "::error::never move a published tag."
            echo "Changed since $TAG:"
            git diff --stat "$TAG" "$GITHUB_SHA" -- "${package_paths[@]}"
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "created and pushed $TAG"

      - name: Remind that consumers pin this tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          echo "::notice::$TAG published. Update the pin in BOTH consumers:"
          echo "::notice::  shorelane-pipeline/requirements.txt"
          echo "::notice::  shorelane-dbt/parity/requirements.txt"
          echo "::notice::Their check-pin workflows will fail until both match."
