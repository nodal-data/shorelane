name: pages

# Publishes the public demo surface to GitHub Pages:
#   /            the fictional Shorelane marketing site (context artifact)
#   /explore.html what-this-really-is page (public dataset, repo, nodal-context)
#   /dashboard/  five-revenues Plotly dashboard, rendered --as-of today
#
# The daily cron keeps the dashboard in lockstep with the live warehouse without
# any warehouse credentials: deterministic generation + the arrival rule in
# loaders/visibility.py reproduce exactly what the warehouse sees (the parity
# property). 08:00 UTC runs after the 05:00 load / 06:00 dbt warehouse jobs.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[bi]"
      - name: Assemble site
        run: |
          mkdir -p _site/dashboard
          cp context/website/index.html _site/index.html
          cp site/explore.html _site/explore.html
          python -m bi.plotly.revenue_dashboard --as-of today --out _site/dashboard/index.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
